name: Refresh recommendations

# Re-runs the recommender against live Kalshi data and commits the updated
# docs/index.html so the static GitHub Pages site stays fresh. Triggered:
#   * automatically every day at 12:00 UTC (~8am ET / 7am CT)
#   * manually via the "Run workflow" button in the Actions tab
#   * automatically when this workflow file or the recommender code changes

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      use_sample:
        description: "Use bundled sample data instead of the live Kalshi API"
        required: false
        default: "false"
  push:
    branches: [main]
    paths:
      - "kalshi_recommender/**"
      - ".github/workflows/refresh-recommendations.yml"

permissions:
  contents: write

concurrency:
  group: refresh-recommendations
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Regenerate docs/index.html
        env:
          USE_SAMPLE: ${{ github.event.inputs.use_sample }}
        run: |
          set -euo pipefail
          mkdir -p docs
          if [ "${USE_SAMPLE:-false}" = "true" ]; then
            kalshi-recommender --sample --format html --output docs/index.html
          else
            # Fall back to sample data if the live API call fails so the
            # site never goes blank.
            if ! kalshi-recommender --format html --output docs/index.html; then
              echo "Live Kalshi API call failed; falling back to sample data."
              kalshi-recommender --sample --format html --output docs/index.html
            fi
          fi
          # Also publish a JSON sidecar for anyone who wants the raw picks.
          if [ "${USE_SAMPLE:-false}" = "true" ]; then
            kalshi-recommender --sample --format json --output docs/recommendations.json
          else
            kalshi-recommender --format json --output docs/recommendations.json \
              || kalshi-recommender --sample --format json --output docs/recommendations.json
          fi
          touch docs/.nojekyll
          # Also update PICKS.md at the repo root so the picks are visible
          # directly on the GitHub repo page (no Pages setup needed).
          if [ "${USE_SAMPLE:-false}" = "true" ]; then
            kalshi-recommender --sample --format markdown --output PICKS.md
          else
            kalshi-recommender --format markdown --output PICKS.md \
              || kalshi-recommender --sample --format markdown --output PICKS.md
          fi

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/ PICKS.md; then
            echo "No changes; nothing to commit."
            exit 0
          fi
          git add docs/ PICKS.md
          git commit -m "Refresh Kalshi recommendations ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
