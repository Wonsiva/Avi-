name: Refresh recommendations

# Re-runs the recommender against live Kalshi data and commits the updated
# docs/index.html, docs/recommendations.json, and PICKS.md. Triggered:
#   * automatically every day at 12:00 UTC (~8am ET / 7am CT)
#   * manually via the "Run workflow" button in the Actions tab
#   * automatically when this workflow file or the recommender code changes

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      use_sample:
        description: "Use bundled sample data instead of the live Kalshi API"
        required: false
        default: "false"
  push:
    branches: [main]
    paths:
      - "kalshi_recommender/**"
      - ".github/workflows/refresh-recommendations.yml"

permissions:
  contents: write

concurrency:
  group: refresh-recommendations
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Regenerate output files
        env:
          USE_SAMPLE: ${{ github.event.inputs.use_sample }}
        run: |
          set -euo pipefail
          mkdir -p docs
          touch docs/.nojekyll

          # Helper: try live Kalshi, fall back to sample data if live call
          # fails OR returns no recommendations. --fail-if-empty makes the
          # CLI exit non-zero when the result would be "No tradable
          # markets" so we know to fall back instead of publishing an
          # empty page.
          render() {
            local fmt="$1" out="$2"
            if [ "${USE_SAMPLE:-false}" = "true" ]; then
              kalshi-recommender --sample --format "$fmt" --output "$out" --verbose
              return
            fi
            if ! kalshi-recommender --format "$fmt" --output "$out" --verbose --fail-if-empty; then
              echo "Live Kalshi fetch for $fmt failed or yielded no picks; falling back to sample data."
              kalshi-recommender --sample --format "$fmt" --output "$out" --verbose
            fi
          }

          render html docs/index.html
          render json docs/recommendations.json
          render markdown PICKS.md

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/ PICKS.md; then
            echo "No changes; nothing to commit."
            exit 0
          fi
          git add docs/ PICKS.md
          git commit -m "Refresh Kalshi recommendations ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
